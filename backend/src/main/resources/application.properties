# Load local credentials from backend/.env when present
spring.config.import=optional:file:./.env[.properties]

# Datasource: read Supabase/PostgreSQL credentials from backend/.env when present.
# Falls back to file-backed H2 for local development without credentials.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/instock;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Keep pool small for cloud poolers (especially in development).
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=600000
# Supabase transaction pooler cannot safely reuse JDBC server-side prepared statements.
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.jpa.open-in-view=false
spring.mail.host=${MAIL_HOST:}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
# Explicit redirect URI used by Spring Security for authorization code callback
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# JWT (from env)
jwt.secret=${JWT_SECRET:ReplaceWithAStrongRandomBase64OrHex_secret_here}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Frontend URL used for OAuth2 redirects
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Spoonacular Recipe API (Adapter Pattern)
spoonacular.api.key=${SPOONACULAR_API_KEY:dummy}

# File upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

