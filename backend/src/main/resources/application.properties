# Import local .env (optional)
spring.config.import=optional:file:./.env[.properties]

# Datasource — values come from environment/.env
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${DATABASE_USER:postgres.hgoplbhcorlvpncesota}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
# Explicit redirect URI used by Spring Security for authorization code callback
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# JWT (from env)
jwt.secret=${JWT_SECRET:ReplaceWithAStrongRandomBase64OrHex_secret_here}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Frontend URL used for OAuth2 redirects
app.frontend.url=${FRONTEND_URL}

# Spoonacular Recipe API (Adapter Pattern)
spoonacular.api.key=${SPOONACULAR_API_KEY:}
